<svg viewBox="0 0 400 400" xmlns='http://www.w3.org/2000/svg'>
  <filter id='noiseFilter'>
    <feTurbulence
      type='turbulence'
      baseFrequency='0.65'
      numOctaves='1'
      stitchTiles='stitch' />
    <feColorMatrix in="noise" type="saturate" values="0" />
  </filter>

  <rect width='100%' height='100%' filter='url(#noiseFilter)' />
</svg>
